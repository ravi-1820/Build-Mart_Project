{% extends 'sheader.html' %}
{% load static %}
{% block content %}

<!-- Single Page Header start -->
    <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6 wow fadeInUp" data-wow-delay="0.1s">Add-product </h1>
        <ol class="breadcrumb justify-content-center mb-0 wow fadeInUp" data-wow-delay="0.3s">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item"><a href="#">Pages</a></li>
            <li class="breadcrumb-item active text-white">Add-product</li>
        </ol>
    </div>
    <!-- Single Page Header End -->
    
    {% if msg %}
    <div class="alert alert-danger" role="alert">
        {{msg}}
    </div>
    {% elif msg1 %}
    <div class="alert alert-success" role="alert">
        {{msg1}}
    </div>
    {% endif %}

    <!-- Signup Start -->
    <div class="container-fluid contact py-5">
        <div class="container py-5">
            <div class="p-5 bg-light rounded">
                <div class="row g-4 justify-content-center">
                    <div class="col-lg-7">
                        <div class="text-center mx-auto wow fadeInUp" data-wow-delay="0.1s" style="max-width: 900px;">
                            <h4 class="text-primary border-bottom border-primary border-2 d-inline-block pb-2">Join Us</h4>
                            <h1 class="display-5 mb-4">Add Your Product</h1>
                        </div>

                        <form method="post" action="{% url 'add_product' %}" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="row g-4 wow fadeInUp" data-wow-delay="0.1s">
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <select class="form-select" id="pcategory" name="pcategory" aria-label="Category">
                                            <option value="category" hidden>---Category---</option>
                                            <option value="Cement">Cement</option>
                                            <option value="Rebars">Rebars</option>
                                            <option value="Bricks">Bricks</option>
                                            <option value="Soil">Soil</option>
                                            <option value="Patthar">Patthar</option>
                                            <option value="Concrete Bricks">Concrete Bricks</option>
                                            <option value="Concrete Bricks">Concrete Blocks</option>
                                        </select>
                                        <label for="pcategory">Category</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <select class="form-select" id="pcompany" name="pcompany" aria-label="Company">
                                            <option value="company" hidden>---Company---</option>
                                            <option value="Birla">Birla</option>
                                            <option value="Jindal">Jindal</option>
                                            <option value="Trishul">Trishul</option>
                                            <option value="Village Soil">Village Soil</option>
                                            <option value="Arbuda">Arbuda</option>
                                        </select>
                                        <label for="pcompany">Company</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="pname" name = "pname" placeholder="Product Name">
                                        <label for="name">Product Name</label>
                                    </div>
                                </div>    
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="pprice" name = "pprice" placeholder="Your Product Price">
                                        <label for="pprice">Product Price</label>
                                    </div>
                                </div>
                                    <div class="col-md-12">
                                    <div class="form-floating">
                                    <textarea  placeholder="Product description"  name="pdesc" id="pdesc" rows="5" cols="40" class="from-control">Product Description</textarea>
                                    <p class="help-block text-danger"></p>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="file" class="form-control" id="pimage" name = "pimage" placeholder="Product image">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-primary w-100 py-3" type="submit">Add-Product</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Signup End -->

{% endblock %}
