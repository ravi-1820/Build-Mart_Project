{% extends 'header.html' %}
{% load static %}
{% block content %}

<!-- Single Page Header start -->
    <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6 wow fadeInUp" data-wow-delay="0.1s">Sign Up</h1>
        <ol class="breadcrumb justify-content-center mb-0 wow fadeInUp" data-wow-delay="0.3s">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item"><a href="#">Pages</a></li>
            <li class="breadcrumb-item active text-white">Sign Up</li>
        </ol>
    </div>
    <!-- Single Page Header End -->
    
    {% if msg %}
    <div class="alert alert-danger" role="alert">
        {{msg}}
    </div>
    {% elif msg1 %}
    <div class="alert alert-success" role="alert">
        {{msg1}}
    </div>
    {% endif %}

    <!-- Signup Start -->
    <div class="container-fluid contact py-5">
        <div class="container py-5">
            <div class="p-5 bg-light rounded">
                <div class="row g-4 justify-content-center">
                    <div class="col-lg-7">
                        <div class="text-center mx-auto wow fadeInUp" data-wow-delay="0.1s" style="max-width: 900px;">
                            <h4 class="text-primary border-bottom border-primary border-2 d-inline-block pb-2">Join Us</h4>
                            <h1 class="display-5 mb-4">Create Your Account</h1>
                        </div>

                        <form method="post" action="{% url 'signup' %}" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="row g-4 wow fadeInUp" data-wow-delay="0.1s">
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <select class="form-select" id="usertype" name="usertype" aria-label="Usertype">
                                            <option value="usertype" hidden>---Usertype---</option>
                                            <option value="buyer">Buyer</option>
                                            <option value="seller">Seller</option>
                                            <option value="admin">Admin</option>
                                        </select>
                                        <label for="usertype">Usertype</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="name" name = "name" placeholder="Your Name">
                                        <label for="name">Your Name</label>
                                    </div>
                                </div>    
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="email" class="form-control" id="email" name = "email" placeholder="Your Email">
                                        <label for="email">Your Email</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="tel" class="form-control" id="mobile" name = "mobile" placeholder="Your mobile number">
                                        <label for="mobile">Your mobile number</label>
                                    </div>
                                </div>
                               <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="password" class="form-control" id="password" name = "password" placeholder="Your password">
                                        <label for="password">Your password</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="password" class="form-control" id="confirm_password" name = "confirm_password" placeholder="Your confirm password">
                                        <label for="password">Your confirm password</label>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-floating">
                                        <input type="file" class="form-control" id="uprofile" name ="uprofile" >
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-primary w-100 py-3" type="submit">Signup</button>
                                </div>
                                <div class="col-12 text-center mt-3">
                                    <p>Already have an account? <a href="{% url 'login' %}">Login Here</a></p>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Signup End -->

{% endblock %}
